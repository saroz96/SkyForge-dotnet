services:
  postgres:
    image: postgres:16-alpine
    container_name: amssoftware-postgres
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
      TZ: Asia/Kathmandu
      PGTZ: Asia/Kathmandu
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - ams-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgbouncer:
    image: edoburu/pgbouncer:latest
    container_name: amssoftware-pgbouncer
    restart: always
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      POOL_MODE: transaction
      DEFAULT_POOL_SIZE: 20
      MAX_CLIENT_CONN: 200
    ports:
      - "127.0.0.1:5433:5432"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ams-network

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: amssoftware-api
    restart: always
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      TZ: Asia/Kathmandu
      ConnectionStrings__DefaultConnection: "Host=pgbouncer;Port=5432;Database=${DB_NAME};Username=${DB_USER};Password=${DB_PASSWORD}"
      JWT_SECRET: ${JWT_SECRET}
    ports:
      - "8080:8080"
    depends_on:
      pgbouncer:
        condition: service_started
    networks:
      - ams-network

volumes:
  postgres_data:

networks:
  ams-network:
    driver: bridge